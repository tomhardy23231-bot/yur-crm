name: ci
on: [push, pull_request]

jobs:
  checks:
    runs-on: ubuntu-latest
    env:
      # unit session.test / storage-local подписывают JWT/HMAC — нужен любой секрет.
      AUTH_SECRET: ci-dummy-secret-not-for-production-000000000000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm test

  integration:
    runs-on: ubuntu-latest
    # Чистый Postgres как в проде (Neon PG17): наш раннер сам создаёт роли
    # (shim: authenticated/app_user) и всю схему — supabase CLI больше не нужен.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: yur_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Владелец БД (миграции/adminDb) — суперюзер postgres: владелец таблиц
      # обходит RLS (аналог owner-роли Neon / прежнего service_role).
      DATABASE_URL_ADMIN_DIRECT: postgresql://postgres:postgres@localhost:5432/yur_test
      DATABASE_URL_ADMIN: postgresql://postgres:postgres@localhost:5432/yur_test
      # Пользовательский пул — роль app_user (NOBYPASSRLS), под RLS.
      DATABASE_URL_APP: postgresql://app_user:app_pw@localhost:5432/yur_test
      YUR_DB_ENV: dev
      AUTH_SECRET: ci-dummy-secret-not-for-production-000000000000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      # Миграции (shim + baseline + инкременты) под владельцем БД, DIRECT-строка.
      - run: npm run db:migrate
      # Пароль app_user: shim создаёт роль LOGIN без пароля (пароль вне git),
      # в CI задаём его, чтобы DATABASE_URL_APP подключался.
      - run: PGPASSWORD=postgres psql -h localhost -U postgres -d yur_test -c "ALTER ROLE app_user PASSWORD 'app_pw'"
      # Гранты/колоночная приватность users.salary_*/закрытость private,auth для app_user.
      - run: npm run db:acl-audit
      # Тестовые данные + быстрый RLS-smoke на живой БД (21 инвариант) + integration.
      - run: npm run db:seed
      - run: npm run smoke:rls
      - run: npm run test:integration
